services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  relay:
    build: ./relay-server
    ports:
      - "1234:1234"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  worker1:
    build: ./worker
    environment:
      - REDIS_URL=redis://redis:6379
      - RELAY_URL=http://relay:1234
      - WORKER_ID=worker-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - relay

  worker2:
    build: ./worker
    environment:
      - REDIS_URL=redis://redis:6379
      - RELAY_URL=http://relay:1234
      - WORKER_ID=worker-2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - relay

  worker3:
    build: ./worker
    environment:
      - REDIS_URL=redis://redis:6379
      - RELAY_URL=http://relay:1234
      - WORKER_ID=worker-3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - relay

volumes:
  redis-data:
