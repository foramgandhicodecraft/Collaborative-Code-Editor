<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Collaborative Code Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #1e1e1e; color: #ccc; height: 100vh; display: flex; flex-direction: column; }

    #toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #2d2d2d; border-bottom: 1px solid #444;
    }
    #toolbar label { font-size: 13px; }
    #language-select {
      padding: 4px 8px; background: #3c3c3c; color: #ccc;
      border: 1px solid #555; border-radius: 4px; font-size: 13px;
    }
    #run-btn {
      padding: 6px 18px; background: #0e7a0e; color: white;
      border: none; border-radius: 4px; font-size: 13px; cursor: pointer;
    }
    #run-btn:hover { background: #0f960f; }
    #run-btn:disabled { background: #555; cursor: not-allowed; }
    #status { font-size: 12px; color: #888; margin-left: auto; }
    #editor-container { flex: 1; }
    #output-panel {
      height: 180px; background: #111; border-top: 1px solid #333;
      padding: 10px 16px; overflow-y: auto; font-family: monospace; font-size: 13px;
    }
    .output-line { color: #aaffaa; white-space: pre-wrap; }
    .error-line  { color: #ff8888; white-space: pre-wrap; }
    .info-line   { color: #888;    font-style: italic; }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>Language:</label>
    <select id="language-select">
      <option value="python">Python</option>
      <option value="javascript">JavaScript</option>
      <option value="java">Java</option>
    </select>
    <button id="run-btn">▶ Run</button>
    <span id="status">Connecting...</span>
  </div>
  <div id="editor-container"></div>
  <div id="output-panel">
    <div class="info-line">Output will appear here when you click Run.</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
